<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lavador de Carros</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Controle de Carros - Lava Rápido</h2>

    <div class="container">
        <label>Placa:</label>
        <input type="text" id="placa" placeholder="ABC-1234">

        <label>Modelo:</label>
        <input type="text" id="modelo" placeholder="Fit Uno">

        <label>Tamanho:</label>
        <select id="tamanho">
            <option value="pequeno">Pequeno</option>
            <option value="medio">Médio</option>
            <option value="grande">Grande</option>
        </select>

        <button id="btnSalvar">Salvar Carro</button>

        <div class="msg" id="msg"></div>
    </div>

    <script type="module" src="app.js"></script>
    
</body>
</html>
