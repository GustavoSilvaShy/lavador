<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Lavadores</title>
    <link rel="stylesheet" href="lavadores.css">
</head>
<body>
    <div class="container">
        <h1>Cadastro de valadores</h1>
        <form id="lavadorForm">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required>

            <label for="">Classificação:</label>
            <select name="classificacao" id="classificacao" required>
                <option value="iniciante">Iniciante</option>
                <option value="profissional">Profissional</option>
                <option value="senior">Sênior</option>
            </select>
            <button type="submit" id="salvarBtn">Salvar</button>

        </form>
    </div>
    <script type="module" src="lavadores.js"></script>
</body>
</html>
